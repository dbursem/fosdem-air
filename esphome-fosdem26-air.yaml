esphome:
  name: esphome-fosdem26-air
  friendly_name: esphome-fosdem26-air

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: 17
    num_leds: 4
    chipset: ws2812
    name: "My Light"
    
i2c:
  sda: 14
  scl: 21
  scan: true
  id: bus_a

sensor:
  - platform: scd4x
    co2:
      name: "SDC4x CO2"
      id: SDC4x_CO2
      on_value_range:
      - below: 700
        then:
          - light.control:
              id: neopixels
              state: on
              green: 100%
              red: 0%
              blue: 0%
      - above: 700
        below: 900
        then:
          - light.control:
              id: neopixels
              state: on
              green: 100%
              red: 100%
              blue: 0%
      - above: 900
        below: 1200
        then:
          - light.control:
              id: neopixels
              state: on
              green: 0%
              red: 100%
              blue: 0%
      - above: 1200
        then:
          - light.control:
              id: neopixels
              state: on
              green: 0%
              red: 100%
              blue: 100%
    temperature:
      name: "SDC4x Temperature"
      id: SDC4x_temp
    humidity:
      name: "SDC4x Humidity"
      id: SDC4x_hum
  - platform: bme280_i2c
    address: 0x76
    temperature:
      name: "BME280 Temperature"
      id: bme_temp
    pressure:
      name: "BME280 Pressure"
      id: bme_press
    humidity:
      name: "BME280 Humidity"
      id: bme_hum

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    lambda: |-
      it.printf(0, 20, id(font4), TextAlign::BASELINE_LEFT, "CO2 PPM:");
      it.printf(64, 20, id(font4), TextAlign::BASELINE_LEFT, "%.0f", id(SDC4x_CO2).state);
      
      it.printf(0, 29, id(font1), TextAlign::BASELINE_LEFT, "temp:");
      it.printf(64, 29, id(font1), TextAlign::BASELINE_LEFT, "%.1f C", id(bme_temp).state);

      it.printf(0, 38, id(font1), TextAlign::BASELINE_LEFT, "humidity:");
      it.printf(64, 38, id(font1), TextAlign::BASELINE_LEFT, "%.1f %%", id(bme_hum).state);

      it.printf(0, 47, id(font1), TextAlign::BASELINE_LEFT, "presssure:");
      it.printf(64, 47, id(font1), TextAlign::BASELINE_LEFT, "%.1f hPa", id(bme_press).state);
      
      it.printf(0, 56, id(font1), TextAlign::BASELINE_LEFT,  "Time: ");
      it.strftime(64, 56, id(font1), TextAlign::BASELINE_LEFT,  "%H:%M", id(ntptime).now());
      
time:
  - platform: sntp
    id: ntptime
    timezone: Europe/Amsterdam
    servers:
     - 0.pool.ntp.org
     - 1.pool.ntp.org
     - 2.pool.ntp.org
     
font:
  - file: 'slkscr.ttf'
    id: font1
    size: 8
  - file: 'BebasNeue-Regular.ttf'
    id: font4
    size: 20
